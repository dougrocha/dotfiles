force_keyboard_focus = true
selection_wrap = true
theme = "default"
hide_action_hints = true
close_when_open = true
click_to_close = true
single_click_activation = true
resume_last_query = false

[placeholders]
"default" = { input = " Search...", list = "No Results" }

[keybinds]
quick_activate = []
close = ["Escape", "ctrl c"]
next = ["Down", "ctrl n"]
previous = ["Up", "ctrl p"]

[providers]
max_results = 256
default = ["desktopapplications", "websearch"]

[[providers.prefixes]]
prefix = "/"
provider = "providerlist"

[[providers.prefixes]]
prefix = "."
provider = "files"

[[providers.prefixes]]
prefix = ":"
provider = "symbols"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = "$"
provider = "clipboard"
