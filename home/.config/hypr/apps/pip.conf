windowrule {
  name = picture-in-picture
  match:title = (Picture.?in.?[Pp]icture)

  tag = +pip
}

windowrule {
  name = pip-styling
  match:tag = pip

  tag = -default-opacity
  float = on
  pin = on
  workspace = 1
  size = 600 338
  keep_aspect_ratio = on
  border_size = 0
  opacity = 1 1
  move = (monitor_w-window_w-40) (monitor_h*0.04)
}
