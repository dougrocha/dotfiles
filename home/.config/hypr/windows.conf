windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule = tag +default-opacity, match:class .*

windowrule {
    name = default-opacity

    opacity = 0.97 0.9
    match:tag = default-opacity
}

windowrule {
  name = floating-window

  float = on
  center = on
  match:tag = floating-window
  size = 875 600
}

windowrule = tag +floating-window, match:class ^org\.arsene\.(wiremix|bluetui|switch-audio|btop)$
windowrule = tag +floating-window, match:class (xdg-desktop-portal-gtk|org.gnome.Nautilus), match:title ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*|[C|c]reate.*|[S|s]elect.*|Pick.*|)$

windowrule {
    name = no-opacity-on-media
    match:class =  ^(mpv|com.obsproject.Studio|com.github.PintaProject.Pinta|imv|legcord)$

    tag = -default-opacity,
    opacity = 1 1
}
