[config]
reload_apps = false
set_wallpaper = false
mode = "dark"

[templates.hyprland-colors]
input_path = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/dev/dotfiles/home/.config/hypr/colors.conf"
post_hook = "hyprctl reload"

[templates.hyprland-colors-lua]
input_path = "~/.config/matugen/templates/hyprland-colors.lua"
output_path = "~/dev/dotfiles/home/.config/hypr/colors.lua"

[templates.quickshell-colors]
input_path = "~/.config/matugen/templates/quickshell-colors.qml"
output_path = "~/dev/dotfiles/home/.config/quickshell/Constants/Colors.qml"

[templates.walker]
input_path = "~/.config/matugen/templates/walker.css"
output_path = "~/dev/dotfiles/home/.config/walker/themes/default/colors.css"
